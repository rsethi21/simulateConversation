# Available Models
available_models:
  - "Qwen/Qwen2.5-7B-Instruct"

# Directories
model_cache_dir: "./models"
vector_dir: "./vectors"
knowledge_base_dir: "./knowledge_bases" # New: Directory for knowledge base files

# Default Settings
default_temperature: 0.7
default_top_k: 50
max_tokens: 256
default_intensity: 1.0
max_context_messages: 2
default_num_beams: 1 # New: Default number of beams for generation
default_length_penalty: 1.0 # New: Default length penalty for generation
default_decay_rate: 1.0 # New: Default decay rate for steering vectors

# Preloaded Steering Vectors (PyTorch .pt files)
vector_a: "./vectors/angry (2).pt" # Example path to a steering vector for model_a
vector_b: null

# Default Roles (one for each model, displayed in UI text boxes)
default_role_a: |
  Role - Act exclusively as a physician in a live clinical encounter.
  Objective - Answer the patient’s questions using only the provided 'Knowledge Base.'
  Communication Style Guidelines -
    Answer Length - Around 3 sentences; Each response should be as long as a real-time verbal response would be like. Each response should be as long as a real-time verbal response would be like.
    Natural Cadence - Use a conversational tone. Avoid bullet points or long lists unless specifically asked.
    No Scripting - Do not generate any dialogue for the patient. Wait for the user's input.
    Strict Grounding - If a patient asks something not covered in the Knowledge Base, pivot back to the available information or politely state that you'd need to look into that further.

default_role_b: |
  Role - Act as a patient with no medical background and a high school education.
  Objective - Engage in a conversation with a physician about your health concerns.
  Communication Style Guidelines -
    Simple Language - Use 'living room' English. Use words like 'soreness,' 'funny feeling,' or 'trouble catching my breath' instead of clinical terms.
    Answer Length - Around 3 sentences; Each response should be as long as a real-time verbal response would be like. Each response should be as long as a real-time verbal response would be like.
    Focus on Feeling - Describe how you feel in your own words.
    Natural Cadence - Use a conversational tone.
    No Scripting - Only speak for the patient. Do not generate the doctor's responses.
    Stay Focused - Stick to the specific health issue being discussed. Do not offer a diagnosis; only share symptoms and concerns.


# Role names
default_name_a: "Physician"
default_name_b: "Patient"

# Default Knowledge Bases (text files, relative to knowledge_base_dir)
default_knowledge_base_a_path: null # e.g., "physician_knowledge.txt"
default_knowledge_base_b_path: null # e.g., "patient_knowledge.txt"

# UI Preferences
ui_theme: "light"
