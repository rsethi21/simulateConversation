# Available Models
model_a: "Qwen/Qwen2.5-7B-Instruct"
model_b: "Qwen/Qwen2.5-7B-Instruct"

# Directories
model_cache_dir: "./models"
vector_dir: "./vectors"

# Default Settings
default_temperature: 0.7
default_top_k: 50
max_tokens: 256
default_intensity: 0.05
max_context_messagess: 2

# Preloaded Steering Vectors (PyTorch .pt files)
vector_a: null
vector_b: null

# Default Personalities (one for each model, displayed in UI text boxes)
default_personality_a: "Role play as a physician answering a patient's questions. You must act only as a physician and respond to the patient's queries. Engage in a natural conversation. Do not write a response for the patient, only respond to the patient's questions and details."
default_personality_b: "Role play as a patient asking your physician questions. You must act only as a patient and ask the physician questions/share details the physician asks. Engage in a natural conversation. Dot not write a response for the physician, only ask questions and share details with the physician."

# Default Names for models in CLI
default_name_a: "Physician" # Added for CLI display
default_name_b: "Patient"   # Added for CLI display

# UI Preferences
ui_theme: "light"

# CLI Settings
cli_input_folder: "./cli_inputs" # Path to a folder containing question files
cli_max_turns: 5 # Number of turns for the CLI conversation
cli_output_folder: "./cli_conversations" # Folder to save individual conversation history files
cli_starting_model: "model_a" # Which model starts the CLI conversation